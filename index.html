<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zenoomi — The Daily Wellness Operating System for Your Dog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #f3efe7;
      --surface: #f7f4ee;
      --surface-2: #f1ede6;
      --card: #f8f5ef;
      --text: #171717;
      --muted: #6d675f;
      --muted-2: #8b847a;
      --line: #2c2a26;
      --line-soft: rgba(44, 42, 38, 0.14);
      --green: #4e7463;
      --green-2: #6a8d7a;
      --green-soft: rgba(78, 116, 99, 0.12);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --max: 1180px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(14px);
      background: rgba(243, 239, 231, 0.86);
      border-bottom: 1px solid rgba(44, 42, 38, 0.08);
    }

    .nav-inner {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 20px;
      letter-spacing: -0.02em;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      border: 1.5px solid var(--line);
      display: grid;
      place-items: center;
      background: var(--surface);
    }

    .brand-mark svg {
      width: 20px;
      height: 20px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
    }

    .nav-links a:hover {
      color: var(--text);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 22px;
      border-radius: 999px;
      border: 1.5px solid var(--line);
      font-size: 14px;
      font-weight: 600;
      transition: 0.2s ease;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
      box-shadow: 0 8px 24px rgba(78, 116, 99, 0.18);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
    }

    .hero {
      padding: 56px 0 32px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 34px;
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--line-soft);
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .eyebrow-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green);
    }

    h1 {
      font-size: clamp(38px, 5vw, 68px);
      line-height: 0.98;
      letter-spacing: -0.05em;
      font-weight: 800;
      max-width: 640px;
      margin-bottom: 18px;
    }

    .hero-sub {
      max-width: 580px;
      font-size: 18px;
      line-height: 1.6;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 28px;
    }

    .hero-proof {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
    }

    .hero-proof span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.45);
      border: 1px solid var(--line-soft);
    }

    .hero-visual {
      position: relative;
      min-height: 650px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .phone-shot {
      width: 320px;
      border-radius: 34px;
      overflow: hidden;
      border: 2px solid var(--line);
      background: #fff;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    }

    .phone-shot img {
      width: 100%;
      height: auto;
      display: block;
    }

    .floating-card {
      position: absolute;
      background: rgba(248, 245, 239, 0.94);
      border: 1.5px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 14px 16px;
    }

    .floating-card.top {
      top: 36px;
      right: 0;
      width: 210px;
    }

    .floating-card.bottom {
      bottom: 50px;
      left: 0;
      width: 230px;
    }

    .floating-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 6px;
    }

    .floating-value {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 4px;
    }

    .floating-sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
    }

    .section {
      padding: 36px 0;
    }

    .section-head {
      max-width: 760px;
      margin-bottom: 28px;
    }

    .section-kicker {
      color: var(--green);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .section-title {
      font-size: clamp(30px, 4vw, 46px);
      line-height: 1.04;
      letter-spacing: -0.045em;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .section-copy {
      font-size: 17px;
      line-height: 1.65;
      color: var(--muted);
      max-width: 700px;
    }

    .system-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .system-card,
    .feature-card,
    .tool-card,
    .testimonial,
    .cta-box,
    .gallery-card {
      background: var(--card);
      border: 1.5px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .system-card {
      padding: 22px;
    }

    .system-num {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--green-soft);
      color: var(--green);
      font-weight: 800;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .system-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    .system-desc {
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .feature-card {
      padding: 24px;
    }

    .feature-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: var(--green-soft);
      color: var(--green);
      font-size: 22px;
      margin-bottom: 18px;
    }

    .feature-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
    }

    .feature-copy {
      color: var(--muted);
      line-height: 1.65;
      font-size: 15px;
    }

    .shots-grid {
      display: grid;
      grid-template-columns: 1.1fr 1fr 1fr;
      gap: 16px;
      align-items: stretch;
    }

    .gallery-card {
      padding: 14px;
    }

    .gallery-card img {
      border-radius: 18px;
      border: 1.5px solid var(--line);
      background: #fff;
      width: 100%;
      height: auto;
    }

    .gallery-meta {
      padding: 14px 4px 4px;
    }

    .gallery-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .gallery-copy {
      font-size: 14px;
      line-height: 1.6;
      color: var(--muted);
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .tool-card {
      padding: 22px;
    }

    .tool-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    .tool-copy {
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }

    .tool-note {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted-2);
      line-height: 1.55;
    }

    .testimonial {
      padding: 28px;
      max-width: 840px;
    }

    .quote {
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.35;
      letter-spacing: -0.04em;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .quote-meta {
      color: var(--muted);
      font-size: 15px;
      font-weight: 500;
    }

    .cta-box {
      padding: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .cta-title {
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.02;
      letter-spacing: -0.045em;
      font-weight: 800;
      margin-bottom: 10px;
      max-width: 560px;
    }

    .cta-copy {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
